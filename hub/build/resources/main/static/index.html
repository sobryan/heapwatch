<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeapWatch — JVM Performance Monitor</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --primary: #38bdf8;
      --primary-dark: #0284c7;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --cyan: #22d3ee;
      --purple: #a78bfa;
    }
    body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* Nav */
    .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-size: 1.25rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .nav-brand svg { width: 28px; height: 28px; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); border: none; background: none; transition: all 0.2s; }
    .nav-tab:hover { color: var(--text); background: var(--surface2); }
    .nav-tab.active { color: var(--primary); background: rgba(56, 189, 248, 0.1); }
    .nav-status { display: flex; align-items: center; gap: 8px; font-size: 0.8125rem; color: var(--text-secondary); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.green { background: var(--green); }
    .status-dot.yellow { background: var(--yellow); }
    .status-dot.red { background: var(--red); }

    /* Main Layout */
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; flex-shrink: 0; }
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* JVM Cards */
    .jvm-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
    .jvm-card:hover { border-color: var(--primary); }
    .jvm-card.selected { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); }
    .jvm-card.critical { border-left: 3px solid var(--red); }
    .jvm-card.warning { border-left: 3px solid var(--yellow); }
    .jvm-card.healthy { border-left: 3px solid var(--green); }
    .jvm-name { font-weight: 600; font-size: 0.9375rem; margin-bottom: 2px; }
    .jvm-pid { font-size: 0.75rem; color: var(--text-secondary); }
    .jvm-meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.75rem; color: var(--text-secondary); }

    /* Heap Bar */
    .heap-bar { height: 6px; background: var(--surface2); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .heap-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .heap-bar-fill.green { background: var(--green); }
    .heap-bar-fill.yellow { background: var(--yellow); }
    .heap-bar-fill.red { background: var(--red); }

    /* Status Badge */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-healthy { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .badge-warning { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
    .badge-critical { background: rgba(248, 113, 113, 0.15); color: var(--red); }
    .badge-recording { background: rgba(34, 211, 238, 0.15); color: var(--cyan); }
    .badge-completed { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .badge-failed { background: rgba(248, 113, 113, 0.15); color: var(--red); }
    .badge-pending { background: rgba(148, 163, 184, 0.15); color: var(--text-secondary); }

    /* Section Title */
    .section-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title svg { width: 20px; height: 20px; color: var(--primary); }

    /* Cards Grid */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8125rem; color: var(--text-secondary); margin-top: 4px; }

    /* Panels */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .panel-title { font-size: 0.9375rem; font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

    /* Buttons */
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 0.8125rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: var(--bg); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger { background: var(--red); color: white; }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-outline:hover { background: rgba(56, 189, 248, 0.1); }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Table */
    .table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .table th { text-align: left; color: var(--text-secondary); font-weight: 600; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .table td { padding: 10px 12px; border-bottom: 1px solid rgba(71, 85, 105, 0.3); }

    /* Chat */
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 120px); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .chat-message { margin-bottom: 16px; max-width: 80%; }
    .chat-message.user { margin-left: auto; }
    .chat-message.assistant { margin-right: auto; }
    .chat-bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.9375rem; line-height: 1.6; white-space: pre-wrap; }
    .chat-bubble.user { background: var(--primary-dark); color: white; border-bottom-right-radius: 4px; }
    .chat-bubble.assistant { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
    .chat-input-area { display: flex; gap: 8px; padding: 16px; background: var(--surface); border-top: 1px solid var(--border); }
    .chat-input { flex: 1; padding: 10px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9375rem; font-family: inherit; outline: none; }
    .chat-input:focus { border-color: var(--primary); }

    /* Select */
    .select { padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.8125rem; }
    .input { padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.8125rem; width: 80px; }

    /* Responsive */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Loading spinner */
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pulse for live dot */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    function formatBytes(bytes) {
      if (!bytes || bytes <= 0) return '0 B';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
      if (seconds < 60) return seconds + 's ago';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
      return Math.floor(seconds / 86400) + 'd ago';
    }

    function HeapBar({ used, max }) {
      if (!max || max <= 0) return null;
      const pct = Math.min((used / max) * 100, 100);
      const color = pct > 85 ? 'red' : pct > 70 ? 'yellow' : 'green';
      return (
        <div className="heap-bar">
          <div className={`heap-bar-fill ${color}`} style={{ width: pct + '%' }} />
        </div>
      );
    }

    function Badge({ status }) {
      const cls = {
        HEALTHY: 'badge-healthy', WARNING: 'badge-warning', CRITICAL: 'badge-critical',
        RECORDING: 'badge-recording', COMPLETED: 'badge-completed', FAILED: 'badge-failed',
        PENDING: 'badge-pending', CANCELLED: 'badge-pending', DUMPING: 'badge-recording'
      }[status] || 'badge-pending';
      return <span className={`badge ${cls}`}>{status}</span>;
    }

    // ======== Dashboard Tab ========
    function DashboardTab({ jvms, onSelectJvm }) {
      const healthy = jvms.filter(j => j.status === 'HEALTHY').length;
      const warning = jvms.filter(j => j.status === 'WARNING').length;
      const critical = jvms.filter(j => j.status === 'CRITICAL').length;
      const totalHeapUsed = jvms.reduce((s, j) => s + (j.heapUsedBytes || 0), 0);
      const totalThreads = jvms.reduce((s, j) => s + (j.threadCount || 0), 0);

      return (
        <div>
          <div className="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
          </div>
          <div className="cards-grid">
            <div className="stat-card">
              <div className="stat-value">{jvms.length}</div>
              <div className="stat-label">JVM Processes</div>
            </div>
            <div className="stat-card">
              <div className="stat-value" style={{ color: 'var(--green)' }}>{healthy}</div>
              <div className="stat-label">Healthy</div>
            </div>
            <div className="stat-card">
              <div className="stat-value" style={{ color: critical > 0 ? 'var(--red)' : 'var(--yellow)' }}>{warning + critical}</div>
              <div className="stat-label">Needs Attention</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{formatBytes(totalHeapUsed)}</div>
              <div className="stat-label">Total Heap Used</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{totalThreads}</div>
              <div className="stat-label">Total Threads</div>
            </div>
          </div>

          <div className="panel">
            <div className="panel-title">All JVM Processes</div>
            {jvms.length === 0 ? (
              <div style={{ color: 'var(--text-secondary)', padding: '20px', textAlign: 'center' }}>
                <div className="spinner" style={{ margin: '0 auto 8px' }} />
                <div>Discovering JVM processes...</div>
              </div>
            ) : (
              <table className="table">
                <thead>
                  <tr>
                    <th>Process</th>
                    <th>PID</th>
                    <th>Status</th>
                    <th>Heap</th>
                    <th>Threads</th>
                    <th>JVM Version</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {jvms.map(jvm => (
                    <tr key={jvm.pid} style={{ cursor: 'pointer' }} onClick={() => onSelectJvm(jvm)}>
                      <td style={{ fontWeight: 600 }}>{jvm.displayName}</td>
                      <td style={{ color: 'var(--text-secondary)' }}>{jvm.pid}</td>
                      <td><Badge status={jvm.status || 'HEALTHY'} /></td>
                      <td>
                        {jvm.heapMaxBytes > 0 ? (
                          <span>{formatBytes(jvm.heapUsedBytes)} / {formatBytes(jvm.heapMaxBytes)} ({jvm.heapUsagePercent?.toFixed(0)}%)</span>
                        ) : '—'}
                      </td>
                      <td>{jvm.threadCount || '—'}</td>
                      <td style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>{jvm.jvmVersion ? jvm.jvmVersion.substring(0, 40) : '—'}</td>
                      <td>
                        <button className="btn btn-outline btn-sm" onClick={(e) => { e.stopPropagation(); onSelectJvm(jvm); }}>Inspect</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    // ======== Profiler Tab ========
    function ProfilerTab({ selectedJvm, jvms }) {
      const [recordings, setRecordings] = useState([]);
      const [heapDumps, setHeapDumps] = useState([]);
      const [profileType, setProfileType] = useState('CPU');
      const [duration, setDuration] = useState(30);
      const [loading, setLoading] = useState(false);

      const refreshRecordings = useCallback(() => {
        fetch('/api/profiler/jfr').then(r => r.json()).then(setRecordings).catch(() => {});
        fetch('/api/profiler/heapdump').then(r => r.json()).then(setHeapDumps).catch(() => {});
      }, []);

      useEffect(() => {
        refreshRecordings();
        const t = setInterval(refreshRecordings, 5000);
        return () => clearInterval(t);
      }, [refreshRecordings]);

      const startJfr = () => {
        if (!selectedJvm) return;
        setLoading(true);
        fetch('/api/profiler/jfr', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pid: selectedJvm.pid, processName: selectedJvm.displayName, durationSeconds: duration, profileType })
        }).then(r => r.json()).then(() => { refreshRecordings(); setLoading(false); }).catch(() => setLoading(false));
      };

      const triggerHeapDump = () => {
        if (!selectedJvm) return;
        setLoading(true);
        fetch('/api/profiler/heapdump', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pid: selectedJvm.pid, processName: selectedJvm.displayName })
        }).then(r => r.json()).then(() => { refreshRecordings(); setLoading(false); }).catch(() => setLoading(false));
      };

      return (
        <div>
          <div className="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
            Profiler
          </div>

          <div className="panel">
            <div className="panel-title">Start Recording</div>
            {selectedJvm ? (
              <div>
                <div style={{ marginBottom: 12, color: 'var(--text-secondary)' }}>
                  Target: <strong style={{ color: 'var(--text)' }}>{selectedJvm.displayName}</strong> (PID {selectedJvm.pid})
                </div>
                <div className="btn-group" style={{ marginBottom: 12 }}>
                  <span style={{ fontSize: '0.8125rem', color: 'var(--text-secondary)', alignSelf: 'center' }}>Profile:</span>
                  {['CPU', 'ALLOC', 'FULL'].map(t => (
                    <button key={t} className={`btn btn-sm ${profileType === t ? 'btn-primary' : 'btn-outline'}`} onClick={() => setProfileType(t)}>{t}</button>
                  ))}
                  <span style={{ fontSize: '0.8125rem', color: 'var(--text-secondary)', alignSelf: 'center', marginLeft: 8 }}>Duration:</span>
                  <input type="number" className="input" value={duration} onChange={e => setDuration(parseInt(e.target.value) || 30)} min={5} max={300} />
                  <span style={{ fontSize: '0.8125rem', color: 'var(--text-secondary)', alignSelf: 'center' }}>sec</span>
                </div>
                <div className="btn-group">
                  <button className="btn btn-primary" onClick={startJfr} disabled={loading}>
                    {loading ? <span className="spinner" /> : null} Start JFR Recording
                  </button>
                  <button className="btn btn-danger" onClick={triggerHeapDump} disabled={loading}>
                    Heap Dump
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ color: 'var(--text-secondary)' }}>Select a JVM from the sidebar to start profiling.</div>
            )}
          </div>

          <div className="panel">
            <div className="panel-title">JFR Recordings</div>
            {recordings.length === 0 ? (
              <div style={{ color: 'var(--text-secondary)', padding: '12px 0' }}>No recordings yet.</div>
            ) : (
              <table className="table">
                <thead><tr><th>Process</th><th>Type</th><th>Duration</th><th>Status</th><th>Size</th><th>Started</th><th>Actions</th></tr></thead>
                <tbody>
                  {recordings.map(r => (
                    <tr key={r.id}>
                      <td>{r.processName} (PID {r.pid})</td>
                      <td>{r.profileType}</td>
                      <td>{r.durationSeconds}s</td>
                      <td><Badge status={r.status} /></td>
                      <td>{r.fileSizeBytes > 0 ? formatBytes(r.fileSizeBytes) : '—'}</td>
                      <td>{timeAgo(r.startTime)}</td>
                      <td>
                        {r.status === 'COMPLETED' && <a href={`/api/profiler/jfr/${r.id}/download`} className="btn btn-outline btn-sm">Download</a>}
                        {r.status === 'RECORDING' && <button className="btn btn-danger btn-sm" onClick={() => fetch(`/api/profiler/jfr/${r.id}`, { method: 'DELETE' }).then(refreshRecordings)}>Cancel</button>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          <div className="panel">
            <div className="panel-title">Heap Dumps</div>
            {heapDumps.length === 0 ? (
              <div style={{ color: 'var(--text-secondary)', padding: '12px 0' }}>No heap dumps yet.</div>
            ) : (
              <table className="table">
                <thead><tr><th>Process</th><th>Status</th><th>Size</th><th>Created</th></tr></thead>
                <tbody>
                  {heapDumps.map(d => (
                    <tr key={d.id}>
                      <td>{d.processName} (PID {d.pid})</td>
                      <td><Badge status={d.status} /></td>
                      <td>{d.fileSizeBytes > 0 ? formatBytes(d.fileSizeBytes) : '—'}</td>
                      <td>{timeAgo(d.createdAt)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    // ======== AI Chat Tab ========
    function ChatTab({ jvms }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [sending, setSending] = useState(false);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        fetch('/api/chat/history').then(r => r.json()).then(setMessages).catch(() => {});
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const send = () => {
        if (!input.trim() || sending) return;
        const userMsg = { role: 'user', content: input, timestamp: new Date().toISOString() };
        setMessages(prev => [...prev, userMsg]);
        setInput('');
        setSending(true);
        fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: input })
        })
          .then(r => r.json())
          .then(resp => { setMessages(prev => [...prev, resp]); setSending(false); })
          .catch(() => {
            setMessages(prev => [...prev, { role: 'assistant', content: 'Error connecting to AI service.' }]);
            setSending(false);
          });
      };

      return (
        <div className="chat-container">
          <div className="chat-messages">
            {messages.length === 0 && (
              <div style={{ textAlign: 'center', color: 'var(--text-secondary)', marginTop: 60 }}>
                <div style={{ fontSize: '2rem', marginBottom: 12 }}>🤖</div>
                <div style={{ fontSize: '1.125rem', fontWeight: 600, marginBottom: 8 }}>HeapWatch AI Advisor</div>
                <div>Ask me about your JVM performance. Try:</div>
                <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {["What's the status of my JVMs?", "Analyze heap memory usage", "What do you recommend?"].map(q => (
                    <button key={q} className="btn btn-outline" style={{ margin: '0 auto' }} onClick={() => { setInput(q); }}>{q}</button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`chat-message ${msg.role}`}>
                <div className={`chat-bubble ${msg.role}`}>{msg.content}</div>
              </div>
            ))}
            {sending && (
              <div className="chat-message assistant">
                <div className="chat-bubble assistant"><span className="spinner" /> Analyzing...</div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>
          <div className="chat-input-area">
            <input
              className="chat-input"
              placeholder="Ask about JVM performance, memory leaks, or get recommendations..."
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && send()}
              disabled={sending}
            />
            <button className="btn btn-primary" onClick={send} disabled={sending || !input.trim()}>Send</button>
          </div>
        </div>
      );
    }

    // ======== App ========
    function App() {
      const [tab, setTab] = useState('dashboard');
      const [jvms, setJvms] = useState([]);
      const [selectedJvm, setSelectedJvm] = useState(null);

      const refreshJvms = useCallback(() => {
        fetch('/api/jvms').then(r => r.json()).then(data => {
          setJvms(data);
          if (selectedJvm) {
            const updated = data.find(j => j.pid === selectedJvm.pid);
            if (updated) setSelectedJvm(updated);
          }
        }).catch(() => {});
      }, [selectedJvm]);

      useEffect(() => {
        refreshJvms();
        const t = setInterval(refreshJvms, 5000);
        return () => clearInterval(t);
      }, []);

      const selectJvm = (jvm) => {
        setSelectedJvm(jvm);
        setTab('profiler');
      };

      const critical = jvms.filter(j => j.status === 'CRITICAL').length;
      const warning = jvms.filter(j => j.status === 'WARNING').length;
      const statusColor = critical > 0 ? 'red' : warning > 0 ? 'yellow' : 'green';

      return (
        <div className="app">
          <nav className="nav">
            <div className="nav-brand">
              <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="3" y="6" width="22" height="16" rx="2"/>
                <path d="M8 14l3 3 6-6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                <line x1="10" y1="2" x2="10" y2="6"/><line x1="18" y1="2" x2="18" y2="6"/>
              </svg>
              HeapWatch
            </div>
            <div className="nav-tabs">
              <button className={`nav-tab ${tab === 'dashboard' ? 'active' : ''}`} onClick={() => setTab('dashboard')}>Dashboard</button>
              <button className={`nav-tab ${tab === 'profiler' ? 'active' : ''}`} onClick={() => setTab('profiler')}>Profiler</button>
              <button className={`nav-tab ${tab === 'chat' ? 'active' : ''}`} onClick={() => setTab('chat')}>AI Advisor</button>
            </div>
            <div className="nav-status">
              <span className={`status-dot ${statusColor} pulse`} />
              {jvms.length} JVMs monitored
            </div>
          </nav>

          <div className="main">
            <div className="sidebar">
              <div style={{ fontSize: '0.8125rem', fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span>JVM Processes</span>
                <button className="btn btn-outline btn-sm" onClick={() => fetch('/api/jvms/refresh', { method: 'POST' }).then(r => r.json()).then(setJvms)}>⟳</button>
              </div>
              {jvms.length === 0 && (
                <div style={{ color: 'var(--text-secondary)', textAlign: 'center', padding: 20 }}>
                  <div className="spinner" style={{ margin: '0 auto 8px' }} />
                  <div style={{ fontSize: '0.8125rem' }}>Scanning for JVMs...</div>
                </div>
              )}
              {jvms.map(jvm => (
                <div
                  key={jvm.pid}
                  className={`jvm-card ${(jvm.status || 'healthy').toLowerCase()} ${selectedJvm?.pid === jvm.pid ? 'selected' : ''}`}
                  onClick={() => selectJvm(jvm)}
                >
                  <div className="jvm-name">{jvm.displayName}</div>
                  <div className="jvm-pid">PID {jvm.pid} · {jvm.hostName || 'local'}</div>
                  <div className="jvm-meta">
                    <Badge status={jvm.status || 'HEALTHY'} />
                    <span>{jvm.threadCount || 0} threads</span>
                  </div>
                  <HeapBar used={jvm.heapUsedBytes} max={jvm.heapMaxBytes} />
                </div>
              ))}
            </div>

            <div className="content">
              {tab === 'dashboard' && <DashboardTab jvms={jvms} onSelectJvm={selectJvm} />}
              {tab === 'profiler' && <ProfilerTab selectedJvm={selectedJvm} jvms={jvms} />}
              {tab === 'chat' && <ChatTab jvms={jvms} />}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
